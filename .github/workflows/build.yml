name: Build and Push Container

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build imagen
        run: docker build -t ghcr.io/${{ github.repository_owner }}/pass-reset-secure:latest .

      - name: Push imagen
        run: docker push ghcr.io/${{ github.repository_owner }}/pass-reset-secure:latest
